<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="#">
        <fieldset>
            <legend>Formulaire d'inscription</legend>
            <table>
               
                <tr>
                    <td>
                        <label for="name">Nom complet :</label>
            <input type="text" pattern="[a-zA-Z ]+" maxlength="100" id="name" required>
            <br><br>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="email">Adresse e-mail :</label>
            <input type="email" name="email" id="email" pattern=".*uca.ac.ma$" required>
            <br><br>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="password">Mot de passe :</label>
            <input type="password" name="password" id="password" minlength="8" pattern="^(?=.*[A-Z])(?=.*\d)(?=.*[!#@$]).+$" required>
            <br><br>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="phone">Numero de telephone : </label>
                        <input type="tel" name="phone" id="phone" pattern="(0|\+212)[0-9]{9}"  required title="a vilid moroccan number: 06******** or +2126********">
                        <br><br>
                    </td>

                </tr>
                <tr>
                    <td>
                        <label for="date">Date de naissance :</label>
                        <input type="date" name="date" id="date" max="2006-01-01">
                        <br><br>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="genre">Genre :</label>
                        <select name="genre" id="genre">
                            <option value="none">--Selectionez un genre--</option>
                            <option value="Homme">Homme</option>
                            <option value="Femme">Femme</option>
                        </select>
                        <br><br>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="skills">Competences : </label>
                        <select id="skills" size="4" multiple>
                            <option value="HTML">HTML</option>
                            <option value="CSS">CSS</option>
                            <option value="JavaScript">JavaScript</option>
                            <option value="Python">Python</option>
                            
                        </select>
                        <br><br>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label >Centres d'interet :</label>
                        
                            <input type="checkbox" name="interet" id="sport" value="sport">
                            <label for="sport">Sport</label>
                            <input type="checkbox" name="interet" id="musique" value="musique">
                            <label for="musique">Musique</label>
                            <input type="checkbox" name="interet" id="lecture" value="le">
                            <label for="lecture">Lecture</label>
                        <br><br>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="site">Site Web ":</label>
                        <input type="url" name="site" id="site" required>
                        <br><br>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="bio">Biographie</label>
                        <textarea maxlength="500" name="bio" id="bio" placeholder="Parlez-nous un peu de vous..." required></textarea>
                        <br><br>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="newsletter">Souhaitez-vous recevoir notre newsletter ?</label>
                        <input type="checkbox" name="newsletter" id="newsletter">
                        <br><br>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="pic">Telecharger votre photo de profil (JPEG,PNG) :</label>
                        <input type="file" name="pic" id="pic" accept=".jpg, .jpeg, .png"  required>
                        <h6>Le fichier ne doit pas depasser 2 Mo.</h6>
                        
                    </td>
                </tr>
                <tr>
                    <td>
                        <button type="submit">S'inscrire</button>
                    </td>
                </tr>

            </table>
            
            
            

        </fieldset>
    </form>
</body>
</html>
